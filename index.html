    function matchHTML(m){const s=m.actual||m.predicted, v=verdict(m), cls=v?.kind||(m.actual?"real":""), hyp=!m.group&&!m.confirmed; return `<article class="match ${hyp?"hypothetical":""}"><div class="team">${teamHTML(m.home)}<small>${m.group?"Groupe "+m.group:m.stage}</small></div><div class="score ${cls}">${scoreWithStar(m,s)}<small>${m.actual?"Score réel":"Pronostic "+m.predicted.confidence+"%"}</small>${m.actual?`<div class="prediction-line">Prono ${scoreWithStar(m,m.predicted)}</div>`:""}</div><div class="team away">${teamHTML(m.away)}<small>${fmt(m.date)}</small></div><div class="meta"><span class="pill">${m.stage}</span><span class="pill">Paris</span>${hyp?`<span class="pill hypothetical">Match hypothétique</span>`:""}${m.confirmed?`<span class="pill exact">Rencontre confirmée</span>`:""}${v?`<span class="pill ${v.kind}">${v.label}</span>`:""}${m.actual?.source?`<span class="pill">${m.actual.source}</span>`:""}</div><details class="explain"><summary>Pourquoi ce pronostic ?</summary><div class="why">${why(m)}</div></details></article>`}
    function dailyMatches(ko){const knockouts=ko.rounds.flat().map(m=>({...m,group:null,predicted:predict(m.home,m.away,m.stage),actual:m.confirmed?actualFor(m.home,m.away):null,confirmed:!!m.confirmed,id:m.id})); const third={...ko.third,group:null,predicted:predict(ko.third.home,ko.third.away,ko.third.stage),actual:ko.third.confirmed?actualFor(ko.third.home,ko.third.away):null,confirmed:!!ko.third.confirmed}; return [...state.matches,...knockouts,third].sort((a,b)=>new Date(a.date)-new Date(b.date))}

    function render(){const q=qual(), ko=kos(), champ=win(ko.rounds[4][0]), st=stats(), played=st.total, allCalendar=dailyMatches(ko), now=Date.now(), upcoming=allCalendar.filter(m=>!m.actual&&new Date(m.date).getTime()>=now).sort((a,b)=>new Date(a.date)-new Date(b.date)); $("dashboard").innerHTML=`<section class="panel"><div class="summary"><div class="metric"><strong>104</strong><span>matches, poules à finale</span></div><div class="metric"><strong>${played}</strong><span>scores réels intégrés</span></div><div class="metric"><strong>${st.successRate}%</strong><span>bons vainqueurs ou scores exacts</span></div><div class="metric"><strong>${st.exactRate}%</strong><span>scores complètement justes</span></div><div class="metric"><strong>${st.exact}</strong><span>pronostics exacts</span></div><div class="metric"><strong>${st.partial}</strong><span>vainqueurs justes</span></div><div class="metric"><strong>${st.wrong}</strong><span>pronostics faux</span></div><div class="metric"><strong>${teamHTML(champ)}</strong><span>vainqueur probable actuel</span></div></div></section><section class="panel half"><h2>Prochains matches</h2><div class="matches">${upcoming.length?upcoming.slice(0,6).map(matchHTML).join(""):`<div class="pad note">Aucun match à venir identifié après actualisation ESPN.</div>`}</div></section><section class="panel half"><h2>Scores et pronostics évalués</h2><div class="matches">${state.matches.filter(m=>m.actual).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map(matchHTML).join("")}</div></section>`;
      const selected=$("groupFilter").value, gs=selected=="all"?Object.keys(GROUPS):[selected]; $("groups").innerHTML=gs.map(g=>`<section class="panel half"><h2>Groupe ${g}</h2><table><thead><tr><th>Équipe</th><th>Pts</th><th>BP</th><th>BC</th><th>Diff.</th></tr></thead><tbody>${table(g).map(r=>`<tr><td>${teamHTML(r.team)}</td><td>${r.pts}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gd}</td></tr>`).join("")}</tbody></table><div class="matches">${state.matches.filter(m=>m.group==g).map(matchHTML).join("")}</div></section>`).join("");
      renderDaily(ko); const list=selected=="all"?state.matches:state.matches.filter(m=>m.group==selected); $("allmatches").innerHTML=`<section class="panel"><h2>Tous les matches de groupes</h2><div class="matches">${list.map(matchHTML).join("")}</div></section>`;
      const labels=["16èmes","8èmes","Quarts","Demies","Finale"]; $("bracket").innerHTML=`<section class="panel"><h2>Phase finale hypothétique</h2><div class="bracket"><div class="rounds">${ko.rounds.map((round,i)=>`<details class="round" ${i===0?"open":""}><summary>${labels[i]} <span>${round.length} match${round.length>1?"es":""}</span></summary><div class="round-body">${round.map(m=>{const p=predict(m.home,m.away,m.stage), w=p.home>=p.away?m.home:m.away; return `<div class="node ${m.confirmed?"":"hypothetical"}"><div>${teamHTML(m.home)}</div><div class="score">${p.home} - ${p.away}</div><div>${teamHTML(m.away)}</div><div class="winner">${teamHTML(w)}</div><small>${fmt(m.date)}</small><br>${m.confirmed?`<span class="pill exact">Rencontre confirmée</span>`:`<span class="pill hypothetical">Match hypothétique</span>`}</div>`}).join("")}</div></details>`).join("")}<details class="round"><summary>3e place <span>1 match</span></summary><div class="round-body">${(()=>{const t=ko.third,p=predict(t.home,t.away,t.stage), w=p.home>=p.away?t.home:t.away;return `<div class="node hypothetical"><div>${teamHTML(t.home)}</div><div class="score">${p.home} - ${p.away}</div><div>${teamHTML(t.away)}</div><div class="winner">${teamHTML(w)}</div><small>${fmt(t.date)}</small><br><span class="pill hypothetical">Match hypothétique</span></div>`})()}</div></details></div></div></section>`;
      $("method").innerHTML=`<section class="panel"><h2>Méthode</h2><div class="pad note">L’application pondère rang FIFA, forme de l’année écoulée et quelques confrontations historiques connues. À chaque chargement, elle tente de récupérer les scores et les rencontres officiellement connues via le scoreboard public ESPN, puis recalcule classements, meilleurs troisièmes, phase finale et pronostics. Les scores déjà passés remplacent les pronostics dans le modèle ; le matching ESPN est renforcé par des alias pays, un fallback sur le nom d’événement et les statuts Full Time. Tous les horaires sont affichés dans le fuseau Paris, France. Les deux derniers matches d’un même groupe peuvent partager exactement le même horaire : c’est volontaire pour préserver l’équité sportive. Les données embarquées servent de secours si l’API n’est pas joignable.</div></section>`}
    async function refresh(){
      const status=$("status"); status.textContent="Actualisation ESPN : scores, calendrier confirmé et phase finale..."; let found=0;
      try{
        state.espnEvents=[]; state.confirmedKO=[]; state.unmatchedESPN=[];
        const days=[]; for(let d=new Date("2026-06-11T00:00:00+02:00");d<=new Date("2026-07-19T23:59:00+02:00");d.setDate(d.getDate()+1))days.push(d.toISOString().slice(0,10).replaceAll("-",""));
        const leagues=["fifa.world","fifa.world.cup","fifa.world_cup"];
        const urls=days.flatMap(day=>leagues.map(l=>`https://site.api.espn.com/apis/site/v2/sports/soccer/${l}/scoreboard?dates=${day}&limit=1000`));
        const payloads=await Promise.all(urls.map(u=>fetch(u).then(r=>r.ok?r.json():null).catch(()=>null)));
        const byId=new Map(); payloads.flatMap(p=>p?.events||[]).forEach(ev=>{if(ev?.id&&!byId.has(ev.id))byId.set(ev.id,ev)});
        const events=[...byId.values()]; state.espnEvents=events; state.confirmedKO=extractConfirmedKO(events);
        const scored=new Set();

          const s0=Number(c[0].score), s1=Number(c[1].score); const hasScore=Number.isFinite(s0)&&Number.isFinite(s1); const isPast=new Date(ev.date).getTime()<Date.now(); const isKO=!!stageFromEvent(ev); const winnerTeam=(c[0]?.winner===true||c[0]?.winner==="true")?a:((c[1]?.winner===true||c[1]?.winner==="true")?b:null); if(!isCompletedEvent(ev)&&!(isKO&&isPast&&hasScore&&(s0!==0||s1!==0)))return; if(a!==b&&hasScore){state.actuals[k(a,b)]={team0:a,team1:b,score0:s0,score1:s1,source:"ESPN",winnerTeam}; const sk=k(a,b); if(!scored.has(sk)){scored.add(sk); found++}}

    }
