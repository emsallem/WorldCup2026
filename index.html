        const tableRows=items.map(m=>{const v=verdict(m), hyp=!m.group&&!m.confirmed; return `<tr><td>${heure(m)}</td><td>${m.group?"Groupe "+m.group:m.stage}${hyp?`<br><span class="pill hypothetical">Hypothétique</span>`:""}${m.confirmed?`<br><span class="pill exact">Confirmé</span>`:""}</td><td>${teamHTML(m.home)} - ${teamHTML(m.away)}<details class="explain"><summary>Pourquoi ce pronostic ?</summary><div class="why">${why(m)}</div></details></td><td><strong>${m.actual?scoreWithStar(m,m.actual):"-"}</strong></td><td>${scoreWithStar(m,m.predicted)}</td><td>${v?`<span class="pill ${v.kind}">${v.label}</span>`:"À venir"}</td></tr>`;}).join("");
        const cards=items.map(m=>{const v=verdict(m), hyp=!m.group&&!m.confirmed; const scoreReal=m.actual?`<div class="dc-score-box real">${scoreWithStar(m,m.actual)}</div><div class="dc-score-sep">▸</div>`:'' ; const scorePred=`<div class="dc-score-box pred">${scoreWithStar(m,m.predicted)}</div>`; const verdictPill=v?`<span class="pill ${v.kind}">${v.label}</span>`:`<span class="pill">À venir</span>`; const pronoPill=m.actual?`<span class="pill" style="font-size:.72rem;color:var(--muted)">Prono ${m.predicted.home}-${m.predicted.away}</span>`:""; return `<div class="daily-card"><div class="daily-card-header"><span class="dc-phase">${m.group?"Gr."+m.group:m.stage}${hyp?' <span class="pill hypothetical">Hyp.</span>':""}${m.confirmed?' <span class="pill exact">Conf.</span>':""}</span><span>${heure(m)}</span></div><div class="daily-card-teams"><div class="daily-card-team">${teamHTML(m.home)}</div><div class="daily-card-scores">${scoreReal}${scorePred}</div><div class="daily-card-team right">${teamHTML(m.away)}</div></div><div class="daily-card-footer">${verdictPill}${pronoPill}</div><div class="daily-card-explain"><details class="explain"><summary>Pourquoi ce pronostic ?</summary><div class="why">${why(m)}</div></details></div></div>`;}).join("");
        return `<section class="panel" id="day-${d}"><h2>${dayLabel(items[0].date)} <span style="color:var(--muted);font-weight:600">(${items.length} match${items.length>1?"es":""})</span></h2><table><thead><tr><th>Heure</th><th>Phase</th><th>Match</th><th>Score réel</th><th>Pronostic</th><th>Évaluation</th></tr></thead><tbody>${tableRows}</tbody></table>${cards}</section>`;
      }).join("");
      $("daily").innerHTML=nav+panels;
    }
    function render(){const q=qual(), ko=kos(), champ=win(ko.rounds[4][0]), st=stats(), played=st.total, allCalendar=dailyMatches(ko), now=Date.now(), upcoming=allCalendar.filter(m=>!m.actual&&new Date(m.date).getTime()>=now).sort((a,b)=>new Date(a.date)-new Date(b.date)); $("dashboard").innerHTML=`<section class="panel"><div class="summary"><div class="metric"><strong>104</strong><span>matches, poules à finale</span></div><div class="metric"><strong>${played}</strong><span>scores réels intégrés</span></div><div class="metric"><strong>${st.successRate}%</strong><span>bons vainqueurs ou scores exacts</span></div><div class="metric"><strong>${st.exactRate}%</strong><span>scores complètement justes</span></div><div class="metric"><strong>${st.exact}</strong><span>pronostics exacts</span></div><div class="metric"><strong>${st.partial}</strong><span>vainqueurs justes</span></div><div class="metric"><strong>${st.wrong}</strong><span>pronostics faux</span></div><div class="metric"><strong>${teamHTML(champ)}</strong><span>vainqueur probable actuel</span></div></div></section><section class="panel half"><h2>Prochains matches</h2><div class="matches">${upcoming.length?upcoming.slice(0,6).map(matchHTML).join(""):`<div class="pad note">Aucun match à venir identifié après actualisation ESPN.</div>`}</div></section><section class="panel half"><h2>Scores et pronostics évalués</h2><div class="matches">${state.matches.filter(m=>m.actual).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map(matchHTML).join("")}</div></section>`;
      const selected=$("groupFilter").value, gs=selected=="all"?Object.keys(GROUPS):[selected]; $("groups").innerHTML=gs.map(g=>`<section class="panel half"><h2>Groupe ${g}</h2><table><thead><tr><th>Équipe</th><th>Pts</th><th>BP</th><th>BC</th><th>Diff.</th></tr></thead><tbody>${table(g).map(r=>`<tr><td>${teamHTML(r.team)}</td><td>${r.pts}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gd}</td></tr>`).join("")}</tbody></table><div class="matches">${state.matches.filter(m=>m.group==g).map(matchHTML).join("")}</div></section>`).join("");
      renderDaily(ko); const list=selected=="all"?state.matches:state.matches.filter(m=>m.group==selected); $("allmatches").innerHTML=`<section class="panel"><h2>Tous les matches de groupes</h2><div class="matches">${list.map(matchHTML).join("")}</div></section>`;
      const labels=["16èmes","8èmes","Quarts","Demies","Finale"]; $("bracket").innerHTML=`<section class="panel"><h2>Phase finale hypothétique</h2><div class="bracket"><div class="rounds">${ko.rounds.map((round,i)=>`<details class="round" ${i===0?"open":""}><summary>${labels[i]} <span>${round.length} match${round.length>1?"es":""}</span></summary><div class="round-body">${round.map(m=>{const p=predict(m.home,m.away,m.stage), a=matchActual(m), s=a||p, w=a?win(m):(p.home>=p.away?m.home:m.away), v=a?(a.home===p.home&&a.away===p.away?"exact":(a.winner&&a.winner===(p.home>=p.away?m.home:m.away)||outcome(a)===outcome(p)?"partial":"wrong")):""; return `<div class="node ${m.confirmed?"":"hypothetical"}"><div>${teamHTML(m.home)}</div><div class="score ${a?v:""}">${scoreWithStar(m,s)}<small>${a?`Réel${a.winner&&s.home===s.away?` · TAB ${teamHTML(a.winner)}`:""} · Prono ${scoreWithStar(m,p)}`:"Pronostic"}</small></div><div>${teamHTML(m.away)}</div><div class="winner">${teamHTML(w)}</div><small>${fmt(m.date)}</small><br>${m.confirmed?`<span class="pill exact">Rencontre confirmée</span>`:`<span class="pill hypothetical">Match hypothétique</span>`}${a?` <span class="pill ${v}">${v==="exact"?"Prono exact":v==="partial"?"Vainqueur juste":"Faux"}</span>`:""}</div>`}).join("")}</div></details>`).join("")}<details class="round"><summary>3e place <span>1 match</span></summary><div class="round-body">${(()=>{const t=ko.third,p=predict(t.home,t.away,t.stage), a=matchActual(t), s=a||p, w=a?win(t):(p.home>=p.away?t.home:t.away), v=a?(a.home===p.home&&a.away===p.away?"exact":(a.winner&&a.winner===(p.home>=p.away?t.home:t.away)||outcome(a)===outcome(p)?"partial":"wrong")):"";return `<div class="node ${t.confirmed?"":"hypothetical"}"><div>${teamHTML(t.home)}</div><div class="score ${a?v:""}">${scoreWithStar(t,s)}<small>${a?`Réel${a.winner&&s.home===s.away?` · TAB ${teamHTML(a.winner)}`:""} · Prono ${scoreWithStar(t,p)}`:"Pronostic"}</small></div><div>${teamHTML(t.away)}</div><div class="winner">${teamHTML(w)}</div><small>${fmt(t.date)}</small><br>${t.confirmed?`<span class="pill exact">Rencontre confirmée</span>`:`<span class="pill hypothetical">Match hypothétique</span>`}${a?` <span class="pill ${v}">${v==="exact"?"Prono exact":v==="partial"?"Vainqueur juste":"Faux"}</span>`:""}</div>`})()}</div></details></div></div></section>`;
      $("method").innerHTML=`<section class="panel"><h2>Méthode</h2><div class="pad note">L’application pondère rang FIFA, forme de l’année écoulée et quelques confrontations historiques connues. À chaque chargement, elle tente de récupérer les scores et les rencontres officiellement connues via le scoreboard public ESPN, puis recalcule classements, meilleurs troisièmes, phase finale et pronostics, en ajustant la forme des équipes à partir de tous les scores réels déjà intégrés. Les scores déjà passés remplacent les pronostics dans le modèle ; le matching ESPN est renforcé par des alias pays, un fallback sur le nom d’événement, les statuts Full Time, les vainqueurs aux tirs au but et un filet de sécurité pour les scores de phase finale déjà passés. Les performances réelles de toutes les équipes, dont l’Espagne, l’Argentine et la France, ajustent les pronostics des tours suivants. Tous les horaires sont affichés dans le fuseau Paris, France. Les deux derniers matches d’un même groupe peuvent partager exactement le même horaire : c’est volontaire pour préserver l’équité sportive. Les données embarquées servent de secours si l’API n’est pas joignable.</div></section>`}
    async function refresh(){
      const status=$("status"); status.textContent="Actualisation ESPN : scores, calendrier confirmé et phase finale..."; let found=0;
      try{
        state.espnEvents=[]; state.confirmedKO=[]; state.unmatchedESPN=[];
        const days=[]; for(let d=new Date("2026-06-11T00:00:00+02:00");d<=new Date("2026-07-19T23:59:00+02:00");d.setDate(d.getDate()+1))days.push(d.toISOString().slice(0,10).replaceAll("-",""));
        const leagues=["fifa.world","fifa.world.cup","fifa.world_cup"];
        const urls=days.flatMap(day=>leagues.map(l=>`https://site.api.espn.com/apis/site/v2/sports/soccer/${l}/scoreboard?dates=${day}&limit=1000`));
        const payloads=await Promise.all(urls.map(u=>fetch(u).then(r=>r.ok?r.json():null).catch(()=>null)));
        const byId=new Map(); payloads.flatMap(p=>p?.events||[]).forEach(ev=>{if(ev?.id&&!byId.has(ev.id))byId.set(ev.id,ev)});
        const events=[...byId.values()]; state.espnEvents=events; state.confirmedKO=extractConfirmedKO(events);
        const scored=new Set();
        events.forEach(ev=>{
          const c=ev.competitions?.[0]?.competitors||[]; if(c.length!==2)return;
          const [a,b]=eventTeams(ev);
          if(!a||!b){state.unmatchedESPN.push(ev.name||ev.shortName||ev.id); return;}
          const s0=Number(c[0].score), s1=Number(c[1].score); const hasScore=Number.isFinite(s0)&&Number.isFinite(s1); const isPast=new Date(ev.date).getTime()<Date.now(); const isKO=!!stageFromEvent(ev); const winnerTeam=c[0]?.winner?a:(c[1]?.winner?b:null); if(!isCompletedEvent(ev)&&!(isKO&&isPast&&hasScore&&(s0!==0||s1!==0)))return; if(a!==b&&hasScore){state.actuals[k(a,b)]={team0:a,team1:b,score0:s0,score1:s1,source:"ESPN",winnerTeam}; const sk=k(a,b); if(!scored.has(sk)){scored.add(sk); found++}}
        });
      }catch(e){console.warn(e)}
      build(); render();
      const embedded=state.matches.filter(m=>m.actual?.source==="résultat embarqué").length, confirmed=state.confirmedKO.length, unmatched=state.unmatchedESPN.length;
      status.textContent=found||confirmed?`${found} score(s) ESPN intégré(s), ${confirmed} rencontre(s) de phase finale confirmée(s), ${embedded} score(s) de secours. Bracket recalculé sans doublon, scores KO et tirs au but pris en compte. Fiabilité vainqueur/score : ${stats().successRate}% / ${stats().exactRate}%.${unmatched?` ${unmatched} libellé(s) ESPN non reconnu(s).`:""}`:`API indisponible ou incomplète : ${embedded} score(s) embarqué(s), phase finale recalculée par pronostic.`;
    }
    function init(){const f=$("groupFilter"); f.innerHTML=`<option value="all">Tous les groupes</option>`+Object.keys(GROUPS).map(g=>`<option value="${g}">Groupe ${g}</option>`).join(""); build(); render(); refresh(); $("refresh").onclick=refresh; f.onchange=render; document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".view").forEach(x=>x.classList.add("hidden"));b.classList.add("active");$(b.dataset.view).classList.remove("hidden")})}
    init();
  </script>
